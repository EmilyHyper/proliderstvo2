<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Лідерство — Альбом</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f6f5;
  --card-bg: #ffffff;
  --accent: #326463;
  --accent-light: #4a8c8b;
  --accent-pale: rgba(50,100,99,0.07);
  --text-primary: #1a2e2e;
  --text-secondary: #456060;
  --text-muted: #8aabab;
  --border: #d4e6e5;
  --header-bg: #ffffff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Montserrat',sans-serif;color:var(--text-primary);}

.header{background:linear-gradient(to right, #326463 0%, #326463 45%, #ffffff 75%, #ffffff 100%);}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 40px;border-bottom:1px solid rgba(255,255,255,0.13);
  flex-wrap:wrap;gap:16px;
}
.header-label{font-size:10px;font-weight:600;letter-spacing:0.3em;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:4px;}
.header-title{font-size:clamp(24px,4vw,40px);font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1;}
.header-title span{color:#a8d8d7;}
.header-logos{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.logo-box{background:#fff;border-radius:6px;height:48px;display:flex;align-items:center;justify-content:center;padding:0 10px;}
.logo-box img{height:36px;width:auto;object-fit:contain;display:block;}
.header-bottom{padding:10px 40px;}
.header-count{font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);letter-spacing:0.05em;}

.controls{
  padding:14px 40px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;
  background:#fff;border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(50,100,99,0.07);
}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:360px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
.search-input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;
  padding:9px 12px 9px 34px;font-family:'Montserrat',sans-serif;font-size:13px;
  color:var(--text-primary);outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(50,100,99,0.1);}
.cards-count{font-size:12px;font-weight:600;color:var(--text-muted);margin-left:auto;}

.grid{display:grid;grid-template-columns:1fr;}

.card{
  background:var(--card-bg);display:grid;grid-template-columns:190px 1fr;
  border-bottom:2px solid var(--border);position:relative;
  transition:box-shadow .2s;animation:fadeIn .3s ease both;
}
.card::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--accent);opacity:0;transition:opacity .2s;
}
.card:hover{box-shadow:0 2px 20px rgba(50,100,99,0.1);z-index:1;}
.card:hover::after{opacity:1;}
.card.hidden{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.card-photo-col{
  border-right:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:26px 18px 18px;gap:12px;
  background:linear-gradient(160deg,#eaf3f3 0%,#fff 100%);
}
.photo-frame{
  width:136px;height:136px;border-radius:8px;
  background:#ddeeed;border:2px solid var(--border);
  overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.photo-frame img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.photo-placeholder svg{color:var(--text-muted);}
.card-number{
  font-size:11px;font-weight:700;color:var(--accent);
  letter-spacing:0.15em;background:var(--accent-pale);
  padding:3px 10px;border-radius:20px;
}

.card-content{padding:22px 26px 18px;display:flex;flex-direction:column;}
.card-name{font-size:17px;font-weight:700;letter-spacing:-0.01em;line-height:1.2;margin-bottom:4px;}
.card-work{font-size:11px;font-weight:600;color:var(--accent);line-height:1.45;margin-bottom:14px;}
.card-meta{display:flex;flex-wrap:wrap;gap:7px 18px;margin-bottom:12px;}
.meta-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--text-secondary);}
.meta-item svg{color:var(--accent);flex-shrink:0;}
.divider{height:1px;background:var(--border);margin-bottom:11px;}
.card-bio{font-size:11.5px;font-weight:400;line-height:1.65;color:var(--text-secondary);}
.bio-full{display:none;}
.bio-toggle{
  background:none;border:none;color:var(--accent);
  font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;padding:3px 0;letter-spacing:0.03em;
  text-decoration:underline;text-underline-offset:3px;
  text-decoration-color:rgba(50,100,99,0.3);
}
.card-expertise{
  margin-top:11px;padding:10px 13px;
  background:rgba(50,100,99,0.04);border-left:3px solid var(--border);border-radius:0 5px 5px 0;
}
.card-expertise-label{font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.card-expertise-text{font-size:11px;font-weight:400;line-height:1.6;color:var(--text-secondary);}
.card-leadership{
  margin-top:11px;padding:10px 13px;
  background:var(--accent-pale);border-left:3px solid var(--accent);border-radius:0 5px 5px 0;
}
.card-leadership-label{font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.card-leadership-text{font-size:11px;font-weight:400;font-style:italic;line-height:1.6;color:var(--text-secondary);}
.card-links{margin-top:11px;display:flex;gap:6px;flex-wrap:wrap;}
.social-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:20px;font-size:10.5px;font-weight:600;
  color:var(--text-secondary);text-decoration:none;letter-spacing:0.03em;transition:all .18s;
}
.social-link:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

.footer{padding:24px 40px;background:var(--header-bg);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-text{font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:0.05em;}

@media(max-width:680px){
  .card{grid-template-columns:1fr;}
  .card-photo-col{border-right:none;border-bottom:2px solid var(--border);flex-direction:row;padding:14px;}
  .header-top,.header-bottom,.controls,.footer{padding-left:16px;padding-right:16px;}
}
</style>
</head>

{"name":"Владислав Куїч","work":"Інтерн хірург другого року","date":"13.04.2001","city":"м. Київ","phone":"+380 (97) 964 02 69","bio":"Закінчив Національний медичний університет ім. Богомольця. З 4 курсу працював операційним медичним братом хірургічного відділення у місті Києві. Так обрав свою спеціальність. У процесі роботи в різних закладах охорони здоров'я почав цікавитися, окрім хірургічної діяльності, організацією лікувального процесу. Полюбляю активні види відпочинку, зокрема походи в Карпати.","expertise":"Діагностика та лікування загальнохірургічних патологій, проведення баріатричних операцій.","leadership":"Лідерство — це не лише здатність керувати іншими чи приймати важливі рішення. Насамперед це відповідальність, уміння залишатися спокійним у складних ситуаціях та бути опорою для команди й пацієнта. У хірургії лідерство проявляється щодня: у готовності швидко діяти, брати на себе відповідальність, постійно навчатися та визнавати власні помилки.","photo":"1z0lnYu7I8gbEO6x4wGxv1BGuBxlR5y34","links":[{"t":"instagram","u":"https://www.instagram.com/kuich_vladyslav"}]},

{"name":"Ганна Єременко","work":"Завідувач відділу комплектування донорських кадрів і заготівлі крові та її компонентів, лікар-трансфузіолог","date":"10.03.1997","city":"м. Чернігів","phone":"+380 (66) 211 98 56","bio":"Я — лікар-трансфузіолог та завідувач відділу комплектування донорських кадрів і заготівлі крові та її компонентів Чернігівського обласного центру крові. Відповідаю за організацію донорського руху в області та комунікацію з громадськістю, працюю над розвитком культури добровільного донорства в Україні. Організовую виїзні донації, співпрацю з організованими колективами, освітні та соціальні ініціативи. Вважаю, що сучасний лікар має бути не лише фахівцем, а й лідером, який здатний об'єднувати людей навколо важливих суспільних змін.","expertise":"Трансфузіологія, терапія; організація та проведення донорських кампаній; комплектування донорських кадрів; заготівля компонентів крові; комунікація з донорами; популяризація донорства серед молоді; організація виїзних донацій; медична комунікація та просвітництво в соціальних мережах; кризова координація забезпечення компонентами крові.","leadership":"Для мене лідерство в системі крові — це здатність об'єднати людей навколо ідеї донорства та показати, що кожна донація може врятувати життя. Це про відповідальність за команду, донорів і пацієнтів, які щодня залежать від наявності компонентів крові. Лідер у центрі крові має не лише організовувати процеси, а й формувати довіру до донорства, підтримувати мотивацію людей та бути прикладом людяності, стійкості й професіоналізму навіть у кризових умовах.","photo":"1cf12yMvQI7v9E9EV_bAErolWDN-1Z5xz","links":[{"t":"facebook","u":"https://www.facebook.com/share/1CiUXVFiy1/"}]},

{"name":"Євгенія Жердій","work":"Лікар акушер-гінеколог, КНП Авдіївська центральна міська лікарня Авдіївського міської ради","date":"30.03.1994","city":"м. Гостомель","phone":"+380 (50) 152 06 64","bio":"В 2018 р. закінчила Дніпропетровську медичну академію, а потім повернулася у своє рідне місце, де працювала в Авдіївській центральній міській лікарні лікарем акушер-гінекологом та чергувала в перинатальному центрі міста Покровськ. З початком активних бойових дій у 2022 році ми евакуювали Авдіївську лікарню до міста Києва, так я тут і опинилася. Зараз я працюю у своїй рідній Авдіївській лікарні, в клініці Viva та в Київській міській клінічній лікарні №8 в хірургічному відділенні.","expertise":"Планові медичні огляди, ведення та планування вагітності, оперативна гінекологія, біопсія шийки матки, консультування з приводу вибору контрацепції, встановлення ВМС, радіохвильове лікування шийки матки, кольпоскопія, УЗД органів малого таза та молочних залоз, фолікулометрія, ведення стаціонарних хворих, сексологія, дитяча гінекологія.","leadership":"Лідерство — це різновид влади, як говорить нам тлумачний словник. Для мене ж лідерство — це здатність надихати, мотивувати людей для досягнення загальних цілей. Лідер — це людина, яку повинні поважати, а не боятися, до якої можуть прийти з будь-яким питанням, отримати відповідь та досягти максимального результату.","photo":"17IrDHDLz9MKWGs20Gecg_DSNRYGzpY7N","links":[{"t":"instagram","u":"https://www.instagram.com/dr.zherdy"}]},
{"name":"Єлизавета Журавльова","work":"Лікар-педіатр КНП \"Старобільський ЦПМСД\"","date":"14.05.2000","city":"м. Рівне","phone":"+380 (99) 368 62 00","bio":"Я — лікар-педіатр та дитячий дерматовенеролог, косметолог. Працюю на підставі міжнародних протоколів та доказової медицини. Поєдную медицину та косметологію, допомагаючи пацієнтам не лише лікувати проблеми, а й формувати здорове ставлення до себе та свого тіла. Постійно навчаюся, розвиваю професійний блог і створюю зрозумілий медичний контент для батьків і пацієнтів. У своїй роботі ціную професіоналізм, чесність, індивідуальний підхід і комфорт людини на кожному етапі взаємодії.","expertise":"Педіатрія: профілактика, діагностика та лікування педіатричних захворювань, проведення вакцинації. Дитяча дерматовенерологія: діагностика та лікування захворювань шкіри, волосся та нігтів у дітей. Консультації з підбору дерматологічного та косметологічного догляду.","leadership":"Для мене лідерство — це не лише вміння керувати людьми, а й здатність брати відповідальність за команду, процеси та результат. Лідер задає напрямок, підтримує людей на шляху до спільної мети та допомагає долати труднощі. Водночас справжнє лідерство базується на довірі, прикладі та вмінні мотивувати інших до розвитку.","photo":"186Vbi82UMmNDsjqMzVnP-aoU16HCwa5U","links":[{"t":"instagram","u":"https://www.instagram.com/dr.zhuravlova.el"}]},

{"name":"Ілля Власов","work":"Лікар-акушер-гінеколог пологового відділення, КНТ «Регіональний медичний центр родинного здоровʼя» ДОР»","date":"03.08.1997","city":"м. Дніпро","phone":"+380 (67) 596 64 57","bio":"Я — лікар-акушер-гінеколог, який щиро любить свою професію та цінує довіру пацієнток. У своїй роботі поєдную професійність, уважність до деталей і людяність, адже за кожною історією стоїть жінка зі своїми переживаннями та надіями. Прагну, щоб кожна пацієнтка почувалася не лише в безпеці, а й почутою. Постійний розвиток і сучасний підхід до медицини — невід'ємна частина мого професійного шляху.","expertise":"Прийом фізіологічних і партнерських пологів, ведення пологів високого акушерського ризику, після­пологове спостереження та підтримка грудного вигодовування, ультразвукова діагностика в акушерстві та гінекології, консультування з питань контрацепції, невідкладна допомога в акушерстві та гінекології, оперативне акушерство.","leadership":"Для мене лідерство — це не про посаду чи авторитет, а про відповідальність, спокій і здатність підтримати інших у складний момент. У медицині справжній лідер вміє швидко приймати рішення, працювати в команді та залишатися людяним навіть у ситуаціях високої напруги.","photo":"16kDC431vNFeMbDcH9pZUvvVIbCWaxryN","links":[{"t":"facebook","u":"https://www.facebook.com/share/18rQzceeKa/"}]},

{"name":"Ірина Молочко","work":"Завідувачка спеціалізованим інсультним відділенням, лікар-невролог, КНП «Чернігівська міська лікарня №3» ЧМР","date":"26.08.1994","city":"м. Чернігів","phone":"+380 (50) 280 73 87","bio":"Навчалася у Харківському національному медичному університеті, після­дипломну спеціалізацію здобула в Національному університеті охорони здоров'я України імені П. Л. Шупика. З 2019 року працюю лікарем-неврологом. Із жовтня 2025 року обіймаю посаду завідувача спеціалізованого інсультного відділення. За внесок у розвиток медичної сфери міста у 2024 році відзначена подякою Чернігівської міської ради.","expertise":"Діагностика та лікування неврологічних захворювань, зокрема невідкладних станів (інсульт).","leadership":"Лідерство — це вміння ефективно організовувати роботу команди, мотивувати колег та брати відповідальність за прийняті рішення. Важливо не лише керувати процесами, а й постійно аналізувати показники роботи, оцінювати результати та знаходити шляхи для оптимізації.","photo":"1dcohg5Wz2gU660B_e1-cGfwazRloG9Ei","links":[{"t":"instagram","u":"https://www.instagram.com/_blondirika_"}]},

{"name":"Людмила Ліпич","work":"Лікарка-анестезіологиня, КНП НЦМЛ ім. М. Галицького","date":"28.09.1998","city":"м. Ніжин","phone":"+380 (68) 198 84 25","bio":"Я працюю лікарем-анестезіологом у Ніжинській центральній міській лікарні, а також розвиваю напрям нутриціології, поєднуючи клінічну практику з принципами доказової медицини. Моя професійна діяльність і волонтерство спрямовані на покращення доступності медичної допомоги для найбільш вразливих верств населення, таких як особи з інвалідністю, самотні люди похилого віку та ВПО.","expertise":"Надання невідкладної медичної допомоги та анестезіологічного забезпечення; підбір індивідуальної стратегії для підтримки здорового способу життя; адаптація складних медичних знань для просвітницької роботи серед жінок, популяризація чек-апів.","leadership":"Для мене лідерство — це здатність створювати безпечний простір для ефективної роботи та розвитку команди, а також об'єднувати людей заради спільної мети. У медичній практиці це означає вміння налагодити ефективну, побудовану на довірі взаємодію в мультидисциплінарних командах.","photo":"1RowmpZ--G5HqenpeJHQfGaVZvc0e_qg7","links":[{"t":"instagram","u":"https://www.instagram.com/dr_lipych_wellness"}]},

{"name":"Максим Перепелиця","work":"Лікар-інтерн хірург, КНП «Лебединська лікарня ім К. О. Зільберника»","date":"13.04.2001","city":"м. Суми","phone":"+380 (99) 608 56 37","bio":"Нещодавно знайшов лист, який писав у школі в 7-му класі, де розповідав, ким мрію стати, коли виросту. Там було про медицину, а саме про професію хірурга. І ось уже через більше ніж 10 років я — лікар-інтерн другого року, впевнено продовжую йти до своєї дитячої мрії. Паралельно працюю медичним братом в одній міській лікарні вже близько 4 років, тому маю повне бачення функціонування стаціонару на всіх рівнях.","expertise":"Під керівництвом наставника веду стаціонарних пацієнтів хірургічного профілю (складаю план лікування, асистую або виконую оперативні втручання), періодично залучаюсь до роботи у поліклініці. У ролі брата медичного працюю у маніпуляційному та перев'язувальному кабінетах в умовах відділення ортопедії та травматології.","leadership":"Лідер — насамперед це особа, яка здатна брати на себе відповідальність у критичні моменти. Також це той, хто здатен згуртувати навколо себе однодумців, які будуть повністю довіряти та підтримувати його і працювати на благо спільної справи.","photo":"1qvRzV2sPx5wK4KNA6OSSnHn042_eCEys","links":[{"t":"instagram","u":"https://www.instagram.com/perepelytsia_med"}]},

{"name":"Ольга Устименко","work":"Лікар загальної практики — сімейної медицини, КНП «ЦПМСД м. Ромни» РМР","date":"14.02.1992","city":"м. Ромни, Сумська область","phone":"+380 (67) 303 82 07","bio":"У своїй діяльності я поєдную три важливі ролі: лікаря, експерта та громадського лідера. Як сімейний лікар, я щодня дбаю про здоров'я родин, а робота у складі ЛКК дає мені змогу вирішувати складні експертні питання та допомагати пацієнтам у критичних ситуаціях. Окрім медичної практики, я очолюю громадську організацію, адже вірю, що позитивні зміни в охороні здоров'я починаються з активної позиції.","expertise":"Як сімейний лікар та голова громадської організації дбаю про здоров'я людини як на індивідуальному рівні, так і в масштабах усього суспільства. Моя лікарська практика базується на засадах доказової медицини, системному підході до лікування та профілактиці хвороб для всієї родини.","leadership":"Для мене лідерство в сімейній медицині — це здатність бути головним провідником пацієнта у світі здоров'я. Це вміння брати на себе відповідальність у складних ситуаціях, завойовувати безумовну довіру родини та надихати людей змінювати спосіб життя на краще.","photo":"11Rb2kU2JIHKzh-6qHUSOu32wNJ4TL0df","links":[{"t":"instagram","u":"https://www.instagram.com/taranenckoolgaur"}]},
{"name":"Святослав Карнаух","work":"Лікар-анестезіолог спеціалізованої бригади інтенсивної терапії та реанімації служби медицини катастроф, КНП ХОР «ЦЕМД та МК»","date":"30.08.1995","city":"м. Харків","phone":"+380 (95) 249 23 67","bio":"Я — лікар-анестезіолог та лікар МНС. Шлях у медицині розпочав з медичного коледжу і за 14 років навчання та практичної діяльності пройшов від роботи зі стабільними пацієнтами до надання допомоги вкрай важким і критичним хворим. Особливо ціную накопичений досвід, постійне удосконалення професійних навичок, людяність до пацієнтів та збереження критичного мислення й холодного розуму в найскладніших ситуаціях.","expertise":"Анестезіологічне забезпечення оперативних втручань, інтенсивна терапія та надання невідкладної допомоги вкрай важким пацієнтам; ведення критичних станів, респіраторної підтримки, седації, знеболення та реанімаційних заходів в умовах МНС і стаціонару.","leadership":"Для мене лідерство — це здатність брати відповідальність у критичні моменти, швидко приймати зважені рішення та вести команду спокійно й професійно під тиском. Це поєднання глибоких знань, холодного розуму, людяності та особистого прикладу, який надихає колег у найскладніших ситуаціях.","photo":"1rtwi9xyRXAjhY_EdXHTDhoPRA2iPH82U","links":[{"t":"instagram","u":"https://www.instagram.com/svyatoslavkarnaukh"}]},
{"name":"Софія Задорожня","work":"Лікар-інтерн-офтальмолог, КНП «Міська лікарня №4» ЗМР","date":"08.12.2001","city":"м. Запоріжжя","phone":"+380 (50) 560 09 20","bio":"Я тільки починаю свій шлях, але впевнена в тому, що він буде цікавим, тому що я дуже люблю те, чим займаюся. Орган зору — це орган, через який людина отримує близько 90% інформації із зовнішнього середовища. Тому я захоплена лікуванням очних хвороб, допомагаючи людям бачити наш прекрасний світ краще.","expertise":"Діагностика та лікування очних хвороб; офтальмохірургія.","leadership":"Для мене лідерство — це про відповідальність, про швидке реагування — здатність приймати найбільш доцільне рішення у критичні моменти. Більш того, лідер має створити атмосферу взаєморозуміння і між колегами, і у відносинах «лікар–пацієнт».","photo":"16aAnsxrsszG-DQ4Gz5Fr_1Mi-hEH7WH_","links":[{"t":"instagram","u":"https://www.instagram.com/sonya_niaa"}]},
{"name":"Тамара Колісніченко","work":"Лікар-педіатр, КНП \"Міська дитяча поліклініка №2\" ХМР","date":"14.05.1998","city":"м. Харків","phone":"+380 (66) 525 88 53","bio":"Я — лікар-педіатр, який пройшов шлях від роботи в екстреній медицині до поглибленої спеціалізації в дитячій кардіоревматології. Початком мого професійного становлення стало навчання в медичному коледжі, який я закінчила з відзнакою. Робота на швидкій допомозі дала мені витримку, швидкість прийняття рішень і стресостійкість.","expertise":"Діагностика та лікування захворювань дитячого віку; ведення пацієнтів в амбулаторних умовах та денному стаціонарі; невідкладна допомога дітям; інтерпретація ЕКГ у дітей; діагностика та супровід дітей із серцево-судинною патологією.","leadership":"Для мене лідерство — це вміння вести за собою через власний приклад, а не лише через слова. Це здатність залишатися зібраним у складних ситуаціях, брати відповідальність за рішення та підтримувати команду.","photo":"11AiAUng42BZ-KKPeVcQIPRx_epEp-Wyo","links":[{"t":"instagram","u":"https://www.instagram.com/dr.tamara_kolisnichenko"}]},
{"name":"Тетяна Байда","work":"Медична директорка, сімейна лікарка, КНП «ЦПМСД Сенчанської сільської ради»","date":"28.11.1992","city":"м. Лохвиця","phone":"+380 (50) 643 57 67","bio":"Працюю лікарем близько 10 років. Моїми цінностями є людиноцентричність як щодо пацієнтів, так і щодо моїх колег по роботі. Я активна та натхненна, завжди відкрита до нового.","expertise":"Сімейна медицина — профілактика та лікування захворювань як у дітей, так і у дорослих, а також управління охороною здоров'я. Окрім цього, є тренеркою у проєкті «Діємо для здоров'я».","leadership":"Лідерство для мене — це про відповідальність, ініціативність та людяність.","photo":"1g21Tep3gWEPAEsdQiRroNGROqV6DzjnN","links":[{"t":"instagram","u":"https://www.instagram.com/dr.bayda.tania"}]},
{"name":"Тетяна Носікова","work":"КНП «Центр первинної медико-санітарної допомоги» Опішнянської селищної ради","date":"24.01.1991","city":"смт Опішня, Полтавська область","phone":"+380 (99) 649 03 47","bio":"Працюю медичним директором із 2022 року. Вважаю, що лідер у команді має бачити кінцеву мету та вести колектив за собою, формуючи ефективну команду.","expertise":"Профілактика неінфекційних захворювань у громаді, промоція активного способу життя.","leadership":"Лідерство в медицині — це здатність лікаря чи медичного працівника організовувати команду, приймати відповідальні рішення та покращувати якість допомоги пацієнтам. Лідер: координує роботу команди; підтримує колег і пацієнтів; швидко реагує у складних ситуаціях; впроваджує нові методи лікування й організації роботи; бере відповідальність за результат.","photo":"10ZgtVFMoGoIgXE4AWtXoRqTQ2hdnrb57","links":[{"t":"facebook","u":"https://www.facebook.com/share/1BSKWonqiu/"}]},
{"name":"Юлія Лободенко","work":"Завідувач жіночої консультації, лікар акушер-гінеколог, КНП «Жовтоводська міська лікарня»","date":"17.01.1994","city":"м. Жовті Води","phone":"+380 (99) 283 35 30","bio":"Я — лікар акушер-гінеколог, мама двох дітей і жінка, яка добре знає, що таке тримати себе та інших у найскладніші моменти життя. Як внутрішньо переміщена особа, я навчилася не втрачати опору навіть тоді, коли доводиться починати все заново. У своїй професії для мене важливі не лише знання та досвід, а й людяність, підтримка та вміння бути поруч із жінкою в найвразливіші періоди її життя. Активно займаюся просвітницькою діяльністю, щоб робити тему жіночого здоров'я відкритою, зрозумілою та позбавленою страху.","expertise":"Ведення нормальної та патологічної вагітності, діагностика та лікування гінекологічних захворювань, планування вагітності, кольпоскопія, УЗД.","leadership":"Лідерство — це вміння керувати. Це вміння брати відповідальність за дії людей, які тобі довіряють. Це вміння підлаштуватися під умови, створити умови та вивести на високий рівень.","photo":"1SlJzl332ys99iFpeEhZZRpsGZAz8QRCX","links":[{"t":"instagram","u":"https://www.instagram.com/lobodenkoiuliia"}]}
]
</script>

<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <div class="header-label">Альбом учасників</div>
      <h1 class="header-title">PRO <span>Лідерство</span></h1>
    </div>
    <div class="header-logos">
      <img src="logos.png" alt="Логотипи партнерів" style="height:60px;width:auto;object-fit:contain;background:#fff;border-radius:6px;padding:4px 8px;">
    </div>
  </div>
  <div class="header-bottom">
    <span class="header-count" id="hcount"></span>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" type="text" placeholder="Пошук за іменем або містом…" id="sq">
  </div>
  <span class="cards-count" id="vc"></span>
</div>

<main class="grid" id="grid"></main>

<footer class="footer">
  <span class="footer-text">PRO Лідерство &middot; Альбом учасників</span>
  <span class="footer-text" id="fc"></span>
</footer>

<script>
var people = JSON.parse(document.getElementById('D').textContent);

var SVG = {
  ig: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>',
  fb: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>',
  tt: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>',
  ph: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.38a2 2 0 0 1 1.99-2.18H6.6a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.03a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
  ci: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  ca: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  ps: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8aabab" stroke-width="1.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
};

function sIcon(t){ return t==='instagram'?SVG.ig:t==='facebook'?SVG.fb:SVG.tt; }
function sLabel(t){ return t==='instagram'?'Instagram':t==='facebook'?'Facebook':'TikTok'; }

function makeCard(p, i) {
  var num = (i < 9 ? '0' : '') + (i + 1);
  var MAX = 170;
  var hasMore = p.bio.length > MAX;
  var shortBio = hasMore ? p.bio.slice(0, p.bio.lastIndexOf(' ', MAX)) + '&hellip;' : p.bio;

  var photoHtml;
  if (p.photo) {
    photoHtml = '<img id="pi' + i + '" src="https://lh3.googleusercontent.com/d/' + p.photo + '" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">';
  } else {
    photoHtml = '<div class="photo-placeholder">' + SVG.ps + '</div>';
  }

  var links = p.links.map(function(l){
    return '<a class="social-link" href="' + l.u + '" target="_blank" rel="noopener">' + sIcon(l.t) + sLabel(l.t) + '</a>';
  }).join('');

  var expertiseHtml = p.expertise
    ? '<div class="card-expertise"><div class="card-expertise-label">Моя експертиза</div><div class="card-expertise-text">' + p.expertise + '</div></div>'
    : '';

  var leader = p.leadership
    ? '<div class="card-leadership"><div class="card-leadership-label">Лідерство для мене</div><div class="card-leadership-text">' + p.leadership + '</div></div>'
    : '';

  var bioExtra = hasMore
    ? '<span class="bio-full" style="display:none">' + p.bio + '</span><button class="bio-toggle" onclick="tog(this)">Читати більше</button>'
    : '';

  return '<article class="card" data-n="' + p.name.toLowerCase() + '" data-c="' + p.city.toLowerCase() + '">'
    + '<div class="card-photo-col">'
    +   '<div class="photo-frame">' + photoHtml + '</div>'
    +   '<div class="card-number">№ ' + num + '</div>'
    + '</div>'
    + '<div class="card-content">'
    +   '<h2 class="card-name">' + p.name + '</h2>'
    +   '<div class="card-work">' + p.work + '</div>'
    +   '<div class="card-meta">'
    +     '<span class="meta-item">' + SVG.ca + ' ' + p.date + '</span>'
    +     '<span class="meta-item">' + SVG.ci + ' ' + p.city + '</span>'
    +     '<span class="meta-item">' + SVG.ph + ' ' + p.phone + '</span>'
    +   '</div>'
    +   '<div class="divider"></div>'
    +   '<div class="card-bio"><span class="bio-short">' + shortBio + '</span>' + bioExtra + '</div>'
    +   expertiseHtml
    +   leader
    +   (links ? '<div class="card-links">' + links + '</div>' : '')
    + '</div></article>';
}

var grid = document.getElementById('grid');
grid.innerHTML = people.map(makeCard).join('');

people.forEach(function(p, i) {
  if (!p.photo) return;
  var img = document.getElementById('pi' + i);
  if (!img) return;
  img.addEventListener('error', function() {
    img.parentNode.innerHTML = '<div class="photo-placeholder">' + SVG.ps + '</div>';
  });
});

var total = people.length;
document.getElementById('hcount').textContent = total + ' учасників програми';
document.getElementById('fc').textContent = total + ' учасників';

function tog(btn) {
  var b = btn.closest('.card-bio');
  var s = b.querySelector('.bio-short');
  var f = b.querySelector('.bio-full');
  var open = f.style.display === 'block';
  f.style.display = open ? 'none' : 'block';
  s.style.display = open ? 'inline' : 'none';
  btn.textContent = open ? 'Читати більше' : 'Згорнути';
}

var sq = document.getElementById('sq');
var vc = document.getElementById('vc');
function recount() {
  var n = grid.querySelectorAll('.card:not(.hidden)').length;
  vc.textContent = n === total ? total + ' учасників' : 'Показано: ' + n + ' з ' + total;
}
sq.addEventListener('input', function() {
  var q = sq.value.toLowerCase().trim();
  grid.querySelectorAll('.card').forEach(function(c) {
    c.classList.toggle('hidden', !!(q && c.dataset.n.indexOf(q) < 0 && c.dataset.c.indexOf(q) < 0));
  });
  recount();
});
recount();
</script>
</body>
</html>
